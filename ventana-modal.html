<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,
        *::after,
        *::before {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            line-height: 1.5;
        }

        #btn-abrir-modal,
        #btn-cerrar-modal {
            padding: 1rem;
            border: 1px solid transparent;
            outline: none;
            background-color: rgb(48, 48, 161);
            color: whitesmoke;
            border-radius: 5px;
            transition: transform .3s ease, box-shadow .3s ease;
        }

        #btn-abrir-modal:hover,
        #btn-cerrar-modal:hover {
            background-color: transparent;
            border: 1px solid rgb(48, 48, 161);
            color: rgb(48, 48, 161);
            transform: translateY(-1px);
            /* transform: scale(1.02); */
            box-shadow: 2px 2px 7px rgb(48, 48, 161);
        }

        dialog {
            width: 95vw;
            border: none;
            border-radius: 10px;
            padding: 2rem;
            position: fixed;
            inset: 0;
            margin: auto;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, .55);
            backdrop-filter: blur(1px);
        }

        #contenido-modal {
            display: flex;
            flex-flow: column;
            justify-content: space-evenly;
            align-items: center;
        }

        #contenido-modal>* {
            padding: 1rem;
        }

        @media (min-width:1024px) {
            dialog {
                width: 50vw;
            }
        }
    </style>
</head>

<body>
    <button id="btn-abrir-modal">Abrir modal</button>
    <!-- Con closeby=any, el modal se cierra al hacer click fuera del modal (sin JS) -->
    <dialog id="mi-modal" closedby="any">
        <div id="contenido-modal">
            <h3>Hola!!! Como estas?</h3>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Maxime modi placeat, accusantium consequatur
                nesciunt cupiditate deleniti fugiat quae quod consequuntur?</p>
            <!-- Envolviendo el boton cerrar con el form method=dialog; se cierra el dialog sin JS -->
            <form method="dialog">
                <button id="btn-cerrar-modal">Cerrar</button>
            </form>
        </div>
    </dialog>
    <script>
        // Abriendo/Cerrando el dialog modal
        const btn_abrir_modal = document.querySelector("#btn-abrir-modal");
        //const btn_cerrar_modal = document.querySelector("#btn-cerrar-modal");
        const mi_modal = document.querySelector("#mi-modal");
        btn_abrir_modal.addEventListener("click", () => {
            mi_modal.showModal();
        })
        //btn_cerrar_modal.addEventListener("click", () => {
        //    mi_modal.close();
        //})

        // Leyendo cuando usuario hace click fuera del modal (para cerrarlo)

        //     const rect = mi_modal.getBoundingClientRect();
        //     const dentro =
        //         rect.top <= e.clientY &&
        //         e.clientY <= rect.top + rect.height &&
        //         rect.left <= e.clientX &&
        //         e.clientX <= rect.left + rect.width;
        //     if (!dentro) {
        //         mi_modal.close();
        //     }
        // });
    </script>
</body>

</html>
